[RvX] # RVX = Revanced Extended
rv-brand = "Extended"
app-name = "-YomaruExt"
exclusive-patches = true # exclude all patches by default. default: false
version = "auto"                                        # latest, auto
build-mode = "apk"
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
# included-patches = "add-splash-animation disable-landscape-mode custom-branding-icon-mmt force-hide-player-button-background force-premium-heading hide-double-tap-overlay-filter materialyou"
# excluded-patches = "custom-branding-icon-revancify-blue custom-package-name disable-quic-protocol enable-tablet-mini-player force-opus-codec force-vp9-codec translations"
# apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-arch = "arm64-v8a"
