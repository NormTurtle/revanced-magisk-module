logging-to-file = true      # enables logging of every patch process to a seperate file
enable-magisk-update = true # set this to false if you do not want to receive updates for the module in magisk app
#patches-documentation       https://github.com/ReVanced-Extended-Community/Patches-Documentation


#  ╭─────────────────────────╮
#  │ Revanced Extenends here │       RVX
#  ╰─────────────────────────╯

[RvX] # RVX = Revanced Extended
app-name = "Yomaru"                                    # commes first in file naming
rv-brand = "Ext"                                       # comes secodn in file naming
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
# build-mode = "both"                                 # apk = "apk" or magisk zip = "module"
apkmirror-arch = "arm64-v8a"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
# exclusive-patches = true                            # exclude all patches by default. default: false
included-patches = "'Custom branding icon MMT' 'Custom branding name YouTube'"
excluded-patches = "'Custom branding icon Revancify Blue' 'Custom branding icon Revancify Red'"
# exclusive-patches = true    # remove all default patches


